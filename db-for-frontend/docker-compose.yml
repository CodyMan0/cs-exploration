services:
  db:
    image: postgis/postgis:16-3.4
    container_name: db-for-frontend
    environment:
      POSTGRES_USER: study
      POSTGRES_PASSWORD: study
      POSTGRES_DB: playground
    ports:
      # 로컬에 이미 Postgres가 5432를 쓰고 있을 수 있어 5433으로 노출
      - "5433:5432"
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U study -d playground"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  db-data:
